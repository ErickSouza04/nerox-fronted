<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexor – Stripe Product Image Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      padding: 40px;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* ── The actual image – 1200×1200 ── */
    #stripe-image {
      width: 1200px;
      height: 1200px;
      background: #090E1A;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* subtle background grid */
    #stripe-image::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(34,197,94,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,197,94,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* glow blob top-right */
    .glow-tr {
      position: absolute;
      top: -120px;
      right: -120px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(34,197,94,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    /* glow blob bottom-left */
    .glow-bl {
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(22,163,74,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* logo mark container */
    .logo-mark-wrap {
      position: relative;
      z-index: 2;
      margin-bottom: 52px;
    }

    /* ring pulse behind logo */
    .logo-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 1.5px solid rgba(34,197,94,0.18);
      box-shadow: 0 0 60px rgba(34,197,94,0.12), inset 0 0 60px rgba(34,197,94,0.06);
    }

    .logo-ring-2 {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 340px;
      height: 340px;
      border-radius: 50%;
      border: 1px solid rgba(34,197,94,0.08);
    }

    /* main N icon */
    .n-icon-bg {
      width: 160px;
      height: 160px;
      background: linear-gradient(135deg, rgba(34,197,94,0.15) 0%, rgba(9,14,26,0.8) 100%);
      border-radius: 38px;
      border: 1.5px solid rgba(34,197,94,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      box-shadow:
        0 0 0 1px rgba(34,197,94,0.1),
        0 20px 60px rgba(0,0,0,0.5),
        0 0 80px rgba(34,197,94,0.1);
    }

    /* brand text */
    .brand-text {
      position: relative;
      z-index: 2;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 96px;
      letter-spacing: -2px;
      line-height: 1;
      color: #EDF2FF;
      margin-bottom: 28px;
    }

    .brand-text span {
      color: #22C55E;
    }

    /* tagline */
    .tagline {
      position: relative;
      z-index: 2;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 500;
      font-size: 26px;
      color: rgba(237,242,255,0.45);
      letter-spacing: 0.3px;
      margin-bottom: 72px;
    }

    /* divider */
    .divider {
      position: relative;
      z-index: 2;
      width: 480px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(34,197,94,0.3), transparent);
      margin-bottom: 64px;
    }

    /* feature pills */
    .pills {
      position: relative;
      z-index: 2;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pill {
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 40px;
      padding: 14px 32px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      font-size: 20px;
      color: rgba(237,242,255,0.7);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pill-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22C55E;
      box-shadow: 0 0 8px rgba(34,197,94,0.8);
      flex-shrink: 0;
    }

    /* bottom domain badge */
    .domain-badge {
      position: absolute;
      bottom: 60px;
      z-index: 2;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: rgba(237,242,255,0.2);
      letter-spacing: 1px;
    }

    /* ── helper buttons ── */
    .controls {
      display: flex;
      gap: 12px;
    }
    .btn {
      padding: 12px 28px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
    }
    .btn-primary { background: #22C55E; color: #090E1A; }
    .btn-secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.12); }
    .hint {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="stripe-image">
    <div class="glow-tr"></div>
    <div class="glow-bl"></div>

    <div class="logo-mark-wrap">
      <div class="logo-ring-2"></div>
      <div class="logo-ring"></div>
      <div class="n-icon-bg">
        <svg width="88" height="88" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="ngrad-stripe" x1="3" y1="2" x2="21" y2="22" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="55%" stop-color="#6ee7a0"/>
              <stop offset="100%" stop-color="#16a34a"/>
            </linearGradient>
          </defs>
          <path d="M3 2H7.5L16.5 15.5V2H21V22H16.5L7.5 8.5V22H3V2Z" fill="url(#ngrad-stripe)"/>
        </svg>
      </div>
    </div>

    <div class="brand-text">Nex<span>or</span></div>
    <div class="tagline">Total clarity on your business profit.</div>

    <div class="divider"></div>

    <div class="pills">
      <div class="pill"><span class="pill-dot"></span>Sales & Expenses</div>
      <div class="pill"><span class="pill-dot"></span>Real-time Profit</div>
      <div class="pill"><span class="pill-dot"></span>Smart Reports</div>
    </div>

    <div class="domain-badge">usenexor.site</div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" onclick="downloadPNG()">⬇ Download PNG (1200×1200)</button>
    <button class="btn btn-secondary" onclick="copyInfo()">📋 Copy size info</button>
  </div>
  <div class="hint">Abra no browser → clique "Download PNG" → faça upload no Stripe Dashboard</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    async function downloadPNG() {
      const btn = document.querySelector('.btn-primary');
      btn.textContent = '⏳ Gerando...';
      btn.disabled = true;

      try {
        const el = document.getElementById('stripe-image');
        const canvas = await html2canvas(el, {
          width: 1200,
          height: 1200,
          scale: 1,
          useCORS: true,
          backgroundColor: '#090E1A',
          logging: false,
        });

        const link = document.createElement('a');
        link.download = 'nexor-stripe-product-image.png';
        link.href = canvas.toDataURL('image/png');
        link.click();

        btn.textContent = '✅ Baixado!';
        setTimeout(() => {
          btn.textContent = '⬇ Download PNG (1200×1200)';
          btn.disabled = false;
        }, 2500);
      } catch (e) {
        btn.textContent = '❌ Erro – veja console';
        btn.disabled = false;
        console.error(e);
      }
    }

    function copyInfo() {
      navigator.clipboard?.writeText('Nexor product image – 1200×1200px PNG – usenexor.site');
    }
  </script>
</body>
</html>
